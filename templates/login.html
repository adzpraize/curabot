<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - CuraBot</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gradient-to-r from-purple-500 to-indigo-600">
<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-semibold mb-4 text-center">Login</h2>
    {% if error %}<p class="text-red-500">{{ error }}</p>{% endif %}
    <form method="POST" class="flex flex-col gap-4">
        <input type="text" name="username" placeholder="Username" class="p-2 border rounded" required>
        <input type="password" name="password" placeholder="Password" class="p-2 border rounded" required>
        <button type="submit" class="bg-purple-600 text-white p-2 rounded hover:bg-purple-700">Login</button>
    </form>
    <p class="mt-4 text-center text-sm">No account? <a href="/register" class="text-purple-600">Register</a></p>
</div>
</body>
</html>
